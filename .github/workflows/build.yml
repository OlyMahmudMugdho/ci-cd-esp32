name: Compile ESP32-S3 Arduino Sketch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Raw Arduino CLI Global Binary
        run: |
          # Force the installation directly into your system binary folder
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sudo BINDIR=/usr/local/bin sh

      - name: Configure and Install ESP32 Core
        run: |
          # Fresh slate config with zero inherited system caching
          mkdir -p ~/.arduino15
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          
          # Complete board index validation tracking
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Dependencies
        run: |
          # If your sketch requires external libraries, uncomment below:
          # arduino-cli lib install "PubSubClient"
          echo "No external libraries specified."

      - name: Compile Sketch
        run: |
          mkdir -p ./sketch
          cp ./sketch.ino ./sketch/sketch.ino
          arduino-cli compile --fqbn esp32:esp32:esp32s3 ./sketch

      - name: Upload compiled binaries
        uses: actions/upload-artifact@v4
        with:
          name: esp32-build-output
          path: |
            sketch/build/**/*
