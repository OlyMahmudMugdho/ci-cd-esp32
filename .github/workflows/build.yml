name: Compile ESP32-S3 Arduino Sketch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Raw Arduino CLI
        run: |
          curl -fsSL https://githubusercontent.com | sh
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Configure and Install ESP32 Core
        run: |
          # Initialize completely fresh data directories
          mkdir -p ~/.arduino15
          
          # Force exact configurations directly into a newly written file
          bin/arduino-cli config init --overwrite
          bin/arduino-cli config set board_manager.additional_urls https://github.io
          
          # Execute indexing and downloads without ambient ghost configs
          bin/arduino-cli core update-index
          bin/arduino-cli core install esp32:esp32

      - name: Install Dependencies
        run: |
          # If your sketch requires external libraries, uncomment below:
          # bin/arduino-cli lib install "PubSubClient"
          echo "No external libraries specified."

      - name: Compile Sketch
        run: |
          bin/arduino-cli compile --fqbn esp32:esp32:esp32s3 ./ci-cd-esp32.ino
