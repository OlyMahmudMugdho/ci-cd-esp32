name: Compile ESP32-S3 Arduino Sketch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls https://github.io
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Dependencies
        run: |
          # If your sketch requires external libraries, uncomment and add them below:
          # arduino-cli lib install "PubSubClient"
          # arduino-cli lib install "ArduinoJson"
          echo "No external libraries specified."

      - name: Compile Sketch
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32s3 ./ci-cd-esp32.ino
