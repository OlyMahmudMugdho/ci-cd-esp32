name: Compile ESP32-S3 Arduino Sketch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      # We forcefully wipe out any cached directories where the invalid URL is saved
      - name: Purge Broken CLI Indexes
        run: |
          rm -rf ~/.arduino15/package_index.json*
          rm -rf ~/.arduino15/cache/*

      # We pass the URL cleanly via ARDUINO_BOARD_MANAGER_ADDITIONAL_URLS environment variable
      - name: Install ESP32 Core
        env:
          ARDUINO_BOARD_MANAGER_ADDITIONAL_URLS: https://github.io
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Dependencies
        run: |
          # If your sketch requires external libraries, uncomment and add them below:
          # arduino-cli lib install "PubSubClient"
          echo "No external libraries specified."

      - name: Compile Sketch
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32s3 ./ci-cd-esp32.ino
