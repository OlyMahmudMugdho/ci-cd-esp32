name: Compile ESP32-S3 Arduino Sketch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Purge Cache and Force Setup
        # We enforce a clean workspace and delete any hidden files from previous builds
        run: |
          rm -rf ~/.arduino15
          mkdir -p ~/.arduino15
          arduino-cli config init --overwrite

      - name: Install ESP32 Core
        # Explicit env overrides prevent the tool from pulling down the ghost 'github.io' link
        env:
          ARDUINO_BOARD_MANAGER_ADDITIONAL_URLS: "https://github.io"
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Dependencies
        run: |
          # If your sketch requires external libraries, uncomment and add them here:
          # arduino-cli lib install "PubSubClient"
          echo "No external libraries specified."

      - name: Compile Sketch
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32s3 ./ci-cd-esp32.ino
